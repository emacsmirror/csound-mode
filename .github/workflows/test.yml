name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Emacs ${{ matrix.emacs-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - "30.2"
          - "29.4"
          - "28.2"
          - "27.2"
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Verify declared runtime dependencies
        shell: bash
        run: |
          package_dir="$(mktemp -d)"
          cp csound-*.el "$package_dir/"
          emacs -Q --batch -L "$package_dir" \
            --funcall batch-byte-compile "$package_dir"/*.el
          emacs -Q --batch -L "$package_dir" \
            --load "$PWD/test/csound-package-tests.el" \
            --funcall ert-run-tests-batch-and-exit

      - name: Install test dependencies
        shell: bash
        run: |
          emacs --batch --no-site-file --no-splash \
            --eval "(require 'package)" \
            --eval "(setq package-user-dir (expand-file-name \".emacs.d/elpa\" default-directory))" \
            --eval "(setq package-archives '((\"gnu\" . \"https://elpa.gnu.org/packages/\") (\"melpa\" . \"https://melpa.org/packages/\")))" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(dolist (pkg '(test-simple)) (unless (package-installed-p pkg) (package-install pkg)))"

      - name: Run tests
        shell: bash
        run: |
          emacs --batch --no-site-file --no-splash -L . \
            --eval "(setq-default indent-tabs-mode nil)" \
            --eval "(require 'package)" \
            --eval "(setq package-user-dir (expand-file-name \".emacs.d/elpa\" default-directory))" \
            --eval "(package-initialize)" \
            --load test/csound-mode-tests.el

      - name: Run score tests
        shell: bash
        run: |
          emacs --batch --no-site-file --no-splash -L . \
            --eval "(require 'package)" \
            --eval "(setq package-user-dir (expand-file-name \".emacs.d/elpa\" default-directory))" \
            --eval "(package-initialize)" \
            --load test/csound-score-tests.el \
            --funcall ert-run-tests-batch-and-exit
